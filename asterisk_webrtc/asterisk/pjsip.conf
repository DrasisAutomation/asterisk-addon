; Transport for standard UDP (Door Phone)
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; Transport for WebRTC (Browser)
[transport-ws]
type=transport
protocol=ws
bind=0.0.0.0:8088

; =====================================
; Door Phone Endpoint (100)
; =====================================
[100]
type=aor
max_contacts=1
remove_existing=yes

[100]
type=auth
auth_type=userpass
password=admin
username=100

[100]
type=endpoint
aors=100
auth=100
context=from-internal
disallow=all
allow=ulaw,alaw,h264
direct_media=no
force_rport=yes
rtp_symmetric=yes
rewrite_contact=yes

; =====================================
; WebRTC Client Endpoint (200)
; =====================================
[200]
type=aor
max_contacts=1
remove_existing=yes

[200]
type=auth
auth_type=userpass
password=webrtc
username=200

[200]
type=endpoint
aors=200
auth=200
context=from-internal
disallow=all
allow=ulaw,alaw,h264
webrtc=yes
dtls_auto_generate_cert=yes
direct_media=no
force_rport=yes
rtp_symmetric=yes
rewrite_contact=yes
