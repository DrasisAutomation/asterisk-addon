[from-internal]
; When door phone (100) dials the server, route it to the WebRTC client (200)
exten => s,1,NoOp(Incoming call from Door Phone)
exten => s,n,Dial(PJSIP/200,30)
exten => s,n,Hangup()

; If door phone explicitly dials 200
exten => 200,1,Dial(PJSIP/200,30)
exten => 200,n,Hangup()

; If WebRTC client dials 100
exten => 100,1,Dial(PJSIP/100,30)
exten => 100,n,Hangup()

; Route ring group 101 to the Outer Project (Node.js SIP Server at 192.168.2.203)
exten => 101,1,NoOp(Routing call to Outer Node.js Server at 192.168.2.203)
exten => 101,n,Dial(PJSIP/101@outer_server,30)
exten => 101,n,Hangup()
