<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Door Phone Interface</title>
    <script src="jssip.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            margin: 0;
        }
        h1 { margin-bottom: 0.5rem; }
        .status { padding: 10px; margin-bottom: 20px; border-radius: 5px; background: #333; font-weight: bold; }
        .status.connected { color: #4ade80; }
        .status.disconnected { color: #f87171; }
        
        .video-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            aspect-ratio: 16/9;
        }
        
        video#remoteVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        video#localVideo {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 120px;
            border-radius: 5px;
            border: 2px solid white;
            background: #222;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .call-btn { background: #4ade80; color: #1e1e1e; }
        .call-btn:hover { background: #22c55e; }
        .end-btn { background: #f87171; color: white; }
        .end-btn:hover { background: #ef4444; }
        .unlock-btn { background: #3b82f6; color: white; }
        .unlock-btn:hover { background: #2563eb; }

        .config {
            display: none; /* Hidden as per user request */
        }
    </style>
</head>
<body>

    <h1>SIP Door Phone Monitor</h1>
    <div id="status" class="status disconnected">Connecting...</div>

    <div class="video-container">
        <!-- Remote Video (Door Phone) -->
        <video id="remoteVideo" autoplay playsinline></video>
        <!-- Local Video (PC Camera) -->
        <video id="localVideo" autoplay playsinline muted></video>
    </div>

    <div class="controls">
        <button id="callBtn" class="call-btn">Call Door Phone</button>
        <button id="endBtn" class="end-btn" style="display: none;">End Call</button>
        <button id="unlockBtn" class="unlock-btn" style="display: none;">Unlock Door (DTMF 1)</button>
    </div>

    <script>
        let ua = null;
        let activeSession = null;
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const statusEl = document.getElementById('status');
        const callBtn = document.getElementById('callBtn');
        const endBtn = document.getElementById('endBtn');
        const unlockBtn = document.getElementById('unlockBtn');
        
        // Hardcoded values
        const SERVER_IP = '192.168.2.25';
        const TARGET_EXT = '101'; // updated to ring group as requested

        function initSIP() {
            try {
                if (typeof JsSIP === 'undefined') {
                    throw new Error('JsSIP library failed to load. Please check your internet connection or Home Assistant proxy settings.');
                }

                if (ua) { ua.stop(); }

                const socket = new JsSIP.WebSocketInterface(`ws://${SERVER_IP}:8088/ws`);
                
                const configuration = {
                    sockets: [socket],
                    uri: `sip:200@${SERVER_IP}`,
                    password: 'webrtc',
                    // WebRTC requires register to receive incoming calls
                    register: true,
                    session_timers: false
                };

                ua = new JsSIP.UA(configuration);

                ua.on('connected', () => {
                    statusEl.textContent = 'Connected to Server';
                    statusEl.className = 'status connected';
                });

                ua.on('disconnected', (e) => {
                    console.error('Disconnected:', e);
                    statusEl.textContent = 'Disconnected (Check Asterisk port 8088)';
                    statusEl.className = 'status disconnected';
                });

                ua.on('registered', () => {
                    statusEl.textContent = 'Registered (Ready to Call)';
                });

                ua.on('registrationFailed', (e) => {
                    console.error('Registration failed:', e);
                    statusEl.textContent = 'Registration Failed';
                    statusEl.className = 'status disconnected';
                });

                // Handle Incoming Calls
                ua.on('newRTCSession', (data) => {
                    const session = data.session;
                    
                    if (data.originator === 'local') return;

                    console.log('Incoming call from: ', session.remote_identity.uri.toString());
                    
                    session.on('sdp', stripSDP);

                    // Auto-answer incoming calls from the door phone
                    session.answer({
                        mediaConstraints: { audio: true, video: true },
                        pcConfig: { iceServers: [] }
                    });

                    handleSession(session);
                });

                ua.start();
            } catch (err) {
                console.error(err);
                statusEl.textContent = 'Error: ' + err.message;
                statusEl.className = 'status disconnected';
            }
        }

        callBtn.addEventListener('click', () => {
            if (!ua || !ua.isRegistered()) {
                alert('Still connecting to server. Please wait or check status.');
                return;
            }
            
            const options = {
                mediaConstraints: { audio: true, video: true },
                pcConfig: { iceServers: [] },
                eventHandlers: {
                    'sdp': stripSDP
                }
            };

            const session = ua.call(`sip:${TARGET_EXT}@${SERVER_IP}`, options);
            handleSession(session);
        });

        endBtn.addEventListener('click', () => {
            if (activeSession) {
                activeSession.terminate();
            }
        });

        unlockBtn.addEventListener('click', () => {
            if (activeSession) {
                // Send DTMF '1' to unlock the door
                activeSession.sendDTMF('1');
                console.log('DTMF 1 sent to unlock door');
                
                // Visual feedback
                unlockBtn.textContent = 'Unlocked!';
                unlockBtn.style.background = '#22c55e';
                setTimeout(() => {
                    unlockBtn.textContent = 'Unlock Door (DTMF 1)';
                    unlockBtn.style.background = '#3b82f6';
                }, 2000);
            }
        });

        function stripSDP(data) {
            if (data.originator === 'local') {
                let lines = data.sdp.split('\r\n');
                let allowedPts = new Set();
                
                // Pass 1: Find payload types we want to KEEP
                for (let line of lines) {
                    if (line.startsWith('a=rtpmap:')) {
                        let pt = line.split(' ')[0].split(':')[1];
                        // Keep basic audio (Opus, PCMU, PCMA, dtmf) and basic video (VP8, H264)
                        if (line.includes('opus/') || line.includes('PCMU/') || line.includes('PCMA/') || 
                            line.includes('telephone-event/') || line.includes('VP8/') || 
                            (line.includes('H264/') && !line.includes('rtx'))) {
                            allowedPts.add(pt);
                        }
                    }
                }

                let newLines = [];
                // Pass 2: Rebuild SDP with only kept payload types and without bloat
                for (let line of lines) {
                    if (!line) continue; // skip empty lines during processing
                    
                    // Strip WebRTC bloat
                    if (line.startsWith('a=extmap:')) continue;
                    if (line.startsWith('a=rtcp-fb:')) continue;
                    if (line.startsWith('a=msid-semantic:')) continue;
                    
                    // Strip unsupported payload types from rtpmap and fmtp
                    if (line.startsWith('a=rtpmap:') || line.startsWith('a=fmtp:')) {
                        let pt = line.split(' ')[0].split(':')[1];
                        if (!allowedPts.has(pt)) continue;
                    }
                    
                    // Strip unsupported payload types from m= lines
                    if (line.startsWith('m=audio') || line.startsWith('m=video')) {
                        let parts = line.split(' ');
                        let newParts = parts.slice(0, 3); // m=type port protocol
                        for (let i = 3; i < parts.length; i++) {
                            if (allowedPts.has(parts[i])) {
                                newParts.push(parts[i]);
                            }
                        }
                        line = newParts.join(' ');
                    }
                    newLines.push(line);
                }
                // Re-join with exact CRLF
                data.sdp = newLines.join('\r\n') + '\r\n';
                console.log('Stripped local SDP size:', data.sdp.length, 'bytes');
            }
        }

        function handleSession(session) {
            activeSession = session;

            session.on('progress', () => { statusEl.textContent = 'Ringing...'; });
            session.on('confirmed', () => {
                statusEl.textContent = 'Call Connected';
                callBtn.style.display = 'none';
                endBtn.style.display = 'inline-block';
                unlockBtn.style.display = 'inline-block';
                
                // Get Local Stream
                const localStream = session.connection.getLocalStreams()[0];
                if (localStream) {
                    localVideo.srcObject = localStream;
                }
            });

            session.on('ended', () => resetCallUI('Call Ended'));
            session.on('failed', (e) => {
                console.error('Call failed:', e);
                resetCallUI('Call Failed');
            });

            // Handle Remote Stream (Video/Audio from Door Phone)
            session.on('peerconnection', (e) => {
                e.peerconnection.addEventListener('track', (event) => {
                    if (event.streams && event.streams[0]) {
                        remoteVideo.srcObject = event.streams[0];
                    } else {
                        const inboundStream = new MediaStream([event.track]);
                        remoteVideo.srcObject = inboundStream;
                    }
                });
            });
        }

        function resetCallUI(msg) {
            activeSession = null;
            statusEl.textContent = msg;
            setTimeout(() => {
                if(ua && ua.isRegistered()) statusEl.textContent = 'Registered (Ready to Call)';
            }, 3000);
            
            callBtn.style.display = 'inline-block';
            endBtn.style.display = 'none';
            unlockBtn.style.display = 'none';
            localVideo.srcObject = null;
            remoteVideo.srcObject = null;
        }

        // Initialize immediately without waiting for window.onload
        initSIP();
    </script>
</body>
</html>
